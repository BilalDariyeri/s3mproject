rest {
    connect_uri = "http://nac_api:8000"

    # ── Authentication ──
    # FreeRADIUS User-Name, User-Password ve Calling-Station-Id'yi API'ye gönderir.
    # API tarafı PAP/CHAP ve MAB ayrımını kendi yapar.
    authenticate {
        uri = "${..connect_uri}/auth"
        method = "post"
        body = "json"
        data = "{\"username\": \"%{User-Name}\", \"password\": \"%{User-Password}\", \"mac_address\": \"%{Calling-Station-Id}\"}"
    }

    # ── Authorization (post-auth) ──
    # Başarılı auth sonrası VLAN ataması için çağrılır.
    authorize {
        uri = "${..connect_uri}/authorize"
        method = "post"
        body = "json"
        data = "{\"username\": \"%{User-Name}\"}"
    }

    # ── Accounting ──
    # Start / Interim-Update / Stop paketlerindeki tüm verileri API'ye iletir.
    accounting {
        uri = "${..connect_uri}/accounting"
        method = "post"
        body = "json"
        data = "{\"username\": \"%{User-Name}\", \"status\": \"%{Acct-Status-Type}\", \"session_id\": \"%{Acct-Session-Id}\", \"nas_ip\": \"%{NAS-IP-Address}\", \"nas_port\": \"%{NAS-Port}\", \"input_octets\": \"%{Acct-Input-Octets}\", \"output_octets\": \"%{Acct-Output-Octets}\", \"session_time\": \"%{Acct-Session-Time}\"}"
    }
}
