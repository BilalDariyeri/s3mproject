services:
  postgres:
    image: postgres:18-alpine
    container_name: nac_postgres
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - nac_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: nac_redis
    networks:
      - nac_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.13-slim
    container_name: nac_api
    working_dir: /app
    volumes:
      - ./api:/app
    env_file: .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - nac_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac_freeradius
    # Komutu en basit haliyle, güvenlik kontrollerini ezerek başlatıyoruz
    command: ["sh", "-c", "chmod 640 /etc/raddb/clients.conf 2>/dev/null || true && chmod 640 /etc/freeradius/clients.conf 2>/dev/null || true && chmod 640 /etc/raddb/mods-enabled/rest 2>/dev/null || true && chmod 640 /etc/freeradius/mods-enabled/rest 2>/dev/null || true && chmod 640 /etc/raddb/sites-enabled/default 2>/dev/null || true && chmod 640 /etc/freeradius/sites-enabled/default 2>/dev/null || true && freeradius -f -xx"]
    volumes:
      - ./radius/clients.conf:/etc/raddb/clients.conf
      - ./radius/default_actual:/etc/raddb/sites-enabled/default
      - ./radius/queries.conf:/etc/raddb/mods-enabled/rest
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "radtest -x testuser testing123 127.0.0.1 0 $$RADIUS_SECRET >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
    networks:
      - nac_net
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  nac_net:
    driver: bridge

volumes:
  pg_data: